<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Showreel V5</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="showreel">

    <div class="sticky-container">

        <!-- VIDEO PRINCIPALE -->

        <div id="center-video">

            <video
                autoplay
                muted
                loop
                playsinline
                preload="auto">

                <source src="video-centre.mp4" type="video/mp4">

            </video>

        </div>

        <!-- GRILLE -->

        <div class="grid">

            <div class="video-card" id="v1">
                <video autoplay muted loop playsinline>
                    <source src="video1.mp4" type="video/mp4">
                </video>
            </div>

            <div class="video-card" id="v2">
                <video autoplay muted loop playsinline>
                    <source src="video2.mp4" type="video/mp4">
                </video>
            </div>

            <div class="video-card" id="v3">
                <video autoplay muted loop playsinline>
                    <source src="video3.mp4" type="video/mp4">
                </video>
            </div>

            <div class="video-card" id="v4">
                <video autoplay muted loop playsinline>
                    <source src="video4.mp4" type="video/mp4">
                </video>
            </div>

            <!-- CASE CENTRALE VIDE -->
            <div></div>

            <div class="video-card" id="v5">
                <video autoplay muted loop playsinline>
                    <source src="video5.mp4" type="video/mp4">
                </video>
            </div>

            <div class="video-card" id="v6">
                <video autoplay muted loop playsinline>
                    <source src="video6.mp4" type="video/mp4">
                </video>
            </div>

            <div class="video-card" id="v7">
                <video autoplay muted loop playsinline>
                    <source src="video7.mp4" type="video/mp4">
                </video>
            </div>

            <div class="video-card" id="v8">
                <video autoplay muted loop playsinline>
                    <source src="video8.mp4" type="video/mp4">
                </video>
            </div>

        </div>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
